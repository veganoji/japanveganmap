<!DOCTYPE html>
<html lang="ja" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>カード・デザイン・ラボ · Japan Vegan Map</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    .__seed { color:inherit; }
    @theme {
      --color-paper:#FFF9EE; --color-cream:#FDF1DA; --color-cream-2:#F6E4BD;
      --color-royal:#C9223A; --color-gold:#D4A847; --color-ink:#1F1812; --color-ink-soft:#3C2E22; --color-muted:#786148;
      --font-noto-sans-jp:"Noto Sans JP", sans-serif;
    }
    html,body { background:var(--color-cream-2); color:var(--color-ink); }
    body { font-family:var(--font-noto-sans-jp); }
    .fd { font-weight:900; }
    a.card { text-decoration:none; display:block; transition: transform .22s ease, box-shadow .22s ease; }
    .arr { transition: transform .2s ease; }
    a.card:hover .arr { transform: translateX(4px); }

    /* ───────── S1 · gradient tile (current baseline) ───────── */
    .s1 { position:relative; border-radius:24px; overflow:hidden; border:2.5px solid var(--color-ink);
      box-shadow:5px 6px 0 var(--color-ink); min-height:286px; color:var(--color-paper); }
    .s1:hover { transform:translate(2px,3px); box-shadow:3px 3px 0 var(--color-ink); }
    .s1 .in { padding:30px; height:100%; display:flex; flex-direction:column; align-items:center; text-align:center; }
    .s1 .ic { width:100px; height:100px; object-fit:contain; filter:drop-shadow(0 7px 10px rgba(31,24,18,.3)); margin-bottom:6px; }
    .s1 h3 { font-weight:900; font-size:24px; }
    .s1 p { margin-top:10px; font-size:14px; line-height:1.8; opacity:.95; flex:1; }
    .s1 .cta { margin-top:18px; display:inline-flex; align-items:center; gap:8px; font-weight:700; background:var(--color-paper);
      color:var(--accent); border:2.5px solid var(--color-ink); border-radius:13px; padding:8px 16px; box-shadow:3px 3px 0 var(--color-ink); }

    /* ───────── S2 · paper editorial (light, left-aligned) ───────── */
    .s2 { position:relative; background:var(--color-paper); border:2px solid var(--color-ink); border-radius:20px; overflow:hidden;
      box-shadow:0 10px 24px rgba(31,24,18,.10); min-height:286px; }
    .s2:hover { transform:translateY(-4px); box-shadow:0 16px 30px rgba(31,24,18,.16); }
    .s2 .stripe { display:block; height:7px; background:var(--accent); }
    .s2 .in { padding:24px 24px 26px; }
    .s2 .badge { width:76px; height:76px; border-radius:50%; background:var(--tint); display:grid; place-items:center; }
    .s2 .badge img { width:52px; height:52px; object-fit:contain; }
    .s2 .tag { margin-top:16px; font-size:11.5px; letter-spacing:.14em; font-weight:800; color:var(--accent); }
    .s2 h3 { margin-top:4px; font-weight:900; font-size:23px; color:var(--color-ink); }
    .s2 p { margin-top:8px; font-size:13.5px; line-height:1.75; color:var(--color-muted); }
    .s2 .cta { margin-top:16px; display:inline-flex; align-items:center; gap:7px; font-weight:800; color:var(--accent); font-size:14px; }

    /* ───────── S3 · horizontal split (icon panel + body) ───────── */
    a.card.s3 { display:flex; background:var(--color-paper); border:2.5px solid var(--color-ink); border-radius:18px; overflow:hidden;
      box-shadow:4px 5px 0 var(--color-ink); }
    .s3:hover { transform:translate(2px,2px); box-shadow:2px 2px 0 var(--color-ink); }
    .s3 .ic { flex:0 0 116px; background:var(--grad); display:grid; place-items:center; border-right:2.5px solid var(--color-ink); }
    .s3 .ic img { width:66px; height:66px; object-fit:contain; filter:drop-shadow(0 5px 8px rgba(31,24,18,.3)); }
    .s3 .body { padding:18px 20px; display:flex; flex-direction:column; justify-content:center; }
    .s3 h3 { font-weight:900; font-size:21px; color:var(--color-ink); }
    .s3 p { margin-top:5px; font-size:13.5px; line-height:1.7; color:var(--color-muted); }
    .s3 .cta { margin-top:11px; display:inline-flex; align-items:center; gap:7px; font-weight:800; color:var(--accent); font-size:14px; }

    /* ───────── S4 · travel postcard / stamp ───────── */
    .s4 { position:relative; background:var(--color-paper); border:2.5px solid var(--color-ink); border-radius:16px;
      box-shadow:4px 5px 0 var(--color-ink); min-height:286px; }
    .s4:hover { transform:translate(2px,2px); box-shadow:2px 2px 0 var(--color-ink); }
    .s4 .frame { margin:10px; border:2px dashed color-mix(in srgb, var(--accent) 55%, transparent); border-radius:11px;
      padding:22px 18px 20px; height:calc(100% - 20px); display:flex; flex-direction:column; align-items:center; text-align:center; }
    .s4 .stamp { width:86px; height:86px; border-radius:14px; background:var(--tint); border:2px solid var(--accent);
      display:grid; place-items:center; transform:rotate(-4deg); }
    .s4 .stamp img { width:56px; height:56px; object-fit:contain; }
    .s4 h3 { margin-top:16px; font-weight:900; font-size:22px; color:var(--color-ink); }
    .s4 p { margin-top:7px; font-size:13.5px; line-height:1.7; color:var(--color-muted); flex:1; }
    .s4 .cta { margin-top:12px; display:inline-flex; align-items:center; gap:7px; font-weight:800; color:var(--accent); font-size:14px; }
    .s4 .post { position:absolute; top:-11px; right:14px; background:var(--accent); color:#fff; font-weight:800; font-size:11px;
      padding:4px 10px; border-radius:999px; border:2px solid var(--color-ink); transform:rotate(5deg); }

    /* ───────── S5 · big breakout sticker ───────── */
    .s5 { position:relative; background:var(--color-paper); border:4px solid var(--accent); border-radius:24px;
      box-shadow:5px 6px 0 var(--color-ink); margin-top:46px; padding:64px 22px 26px; text-align:center; min-height:240px; }
    .s5:hover { transform:translate(2px,3px); box-shadow:3px 3px 0 var(--color-ink); }
    .s5 .ic { position:absolute; top:-46px; left:50%; transform:translateX(-50%); width:118px; height:118px; object-fit:contain;
      filter:drop-shadow(0 8px 10px rgba(31,24,18,.28)); transition:transform .25s ease; }
    .s5:hover .ic { transform:translateX(-50%) translateY(-5px) rotate(-4deg) scale(1.05); }
    .s5 h3 { font-weight:900; font-size:24px; color:var(--accent); }
    .s5 p { margin-top:8px; font-size:13.5px; line-height:1.75; color:var(--color-ink-soft); }
    .s5 .cta { margin-top:16px; display:inline-flex; align-items:center; gap:8px; font-weight:800; color:#fff; background:var(--accent);
      border-radius:999px; padding:8px 18px; font-size:14px; }

    /* lab chrome */
    .optlabel { max-width:1120px; margin:0 auto; padding:34px 24px 8px; display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; }
    .optnum { font-weight:900; font-size:13px; letter-spacing:.12em; color:var(--color-royal);
      background:var(--color-paper); border:2px solid var(--color-ink); border-radius:999px; padding:4px 13px; box-shadow:2px 2px 0 var(--color-ink); }
    .optname { font-weight:900; font-size:20px; color:var(--color-ink); }
    .optdesc { font-size:13px; color:var(--color-muted); font-weight:600; }
    .row { max-width:1120px; margin:0 auto; padding:12px 24px 10px; display:grid; gap:24px; }
    .row.c3 { grid-template-columns:repeat(3,1fr); }
    .row.c1 { grid-template-columns:1fr; max-width:660px; }
    @media (max-width:780px){ .row.c3 { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <header style="background:var(--color-ink); color:var(--color-paper); padding:16px 24px; text-align:center; position:sticky; top:0; z-index:50;">
    <div style="font-weight:900; font-size:16px;">🃏 カード・デザイン・ラボ — 「選択」セクション、まるごと別案</div>
    <div style="font-size:12.5px; opacity:.85; margin-top:3px;">カードのデザインを根本から変えた5案。気に入った番号を教えてください。</div>
  </header>

  <div id="lab"></div>
  <footer style="text-align:center; padding:30px; color:var(--color-muted); font-size:13px;">①〜⑤ のどれかを選んでね 👑</footer>

  <script>
    var CARDS = [
      { title:"からだ", tag:"健康 ・ 栄養", desc:"いいことだらけの植物性。健康と栄養の話。", cta:"ビーガンと体",  icon:"/images/explore/heart.png", accent:"#C9223A", tint:"#FBE3E7", grad:"linear-gradient(160deg,#E55063,#C9223A)" },
      { title:"地球",   tag:"環境 ・ SDGs", desc:"食卓から、地球を変える。環境とのつながり。", cta:"ビーガンと地球", icon:"/images/explore/earth.png", accent:"#3F6A3A", tint:"#E6F0DF", grad:"linear-gradient(160deg,#6C9560,#3F6A3A)" },
      { title:"海",     tag:"海 ・ いのち", desc:"海で、いま起きていること。魚たちを、かぞえる。", cta:"海をかぞえる",  icon:"/images/explore/fish.png",  accent:"#1F6F94", tint:"#DBEBF3", grad:"linear-gradient(160deg,#2B7AB0,#16465F)" }
    ];
    var A = '<svg class="arr" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7h8m0 0L7.5 3.5M11 7l-3.5 3.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>';

    function vars(c){ return "--accent:"+c.accent+"; --tint:"+c.tint+"; --grad:"+c.grad; }
    function render(style, c){
      var s = 'style="'+vars(c)+';"';
      if (style==="s1") return '<a class="card s1" style="background:'+c.grad+'; '+vars(c)+'"><div class="in"><img class="ic" src="'+c.icon+'"><h3>'+c.title+'</h3><p>'+c.desc+'</p><span class="cta">'+c.cta+' '+A+'</span></div></a>';
      if (style==="s2") return '<a class="card s2" '+s+'><span class="stripe"></span><div class="in"><div class="badge"><img src="'+c.icon+'"></div><div class="tag">'+c.tag+'</div><h3>'+c.title+'</h3><p>'+c.desc+'</p><span class="cta">'+c.cta+' '+A+'</span></div></a>';
      if (style==="s3") return '<a class="card s3" '+s+'><div class="ic"><img src="'+c.icon+'"></div><div class="body"><h3>'+c.title+'</h3><p>'+c.desc+'</p><span class="cta">'+c.cta+' '+A+'</span></div></a>';
      if (style==="s4") return '<a class="card s4" '+s+'><span class="post">'+c.tag+'</span><div class="frame"><div class="stamp"><img src="'+c.icon+'"></div><h3>'+c.title+'</h3><p>'+c.desc+'</p><span class="cta">'+c.cta+' '+A+'</span></div></a>';
      if (style==="s5") return '<a class="card s5" '+s+'><img class="ic" src="'+c.icon+'"><h3>'+c.title+'</h3><p>'+c.desc+'</p><span class="cta">'+c.cta+' '+A+'</span></a>';
    }
    var OPTIONS = [
      { n:"①", name:"グラデーション・タイル（現在）", desc:"いまの色塗りタイル。白文字＋ステッカーボタン", style:"s1", cols:"c3" },
      { n:"②", name:"ペーパー・カード（明るい・誌面風）", desc:"クリーム地に黒文字、色は丸バッジと帯だけ。上品", style:"s2", cols:"c3" },
      { n:"③", name:"横並びスプリット（リスト型）", desc:"左に色アイコン枠、右に本文。メニューのような並び", style:"s3", cols:"c1" },
      { n:"④", name:"トラベル・スタンプ／ポストカード", desc:"破線フレーム＋切手風アイコン＋角のスタンプ。地図らしい遊び", style:"s4", cols:"c3" },
      { n:"⑤", name:"ビッグ・ステッカー（はみ出し）", desc:"特大アイコンが上にはみ出す、太い色枠のトイっぽい案", style:"s5", cols:"c3" }
    ];
    var lab = document.getElementById("lab");
    OPTIONS.forEach(function(o){
      var label=document.createElement("div"); label.className="optlabel";
      label.innerHTML='<span class="optnum">'+o.n+'</span><span class="optname">'+o.name+'</span><span class="optdesc">'+o.desc+'</span>';
      lab.appendChild(label);
      var row=document.createElement("div"); row.className="row "+o.cols;
      row.innerHTML = CARDS.map(function(c){ return render(o.style,c); }).join("");
      lab.appendChild(row);
    });
  </script>
</body>
</html>
