<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="robots" content="noindex,follow"/>
<title>404 — ページが見つかりません · 日本ビーガンマップ</title>
<link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32.png"/>
<link rel="apple-touch-icon" sizes="180x180" href="/images/favicon-180.png"/>
<meta name="theme-color" content="#FFF9EE"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FFF9EE; --cream:#FDF1DA; --royal:#C9223A; --royal-deep:#9C1428;
    --gold:#D4A847; --gold-soft:#E8C76F; --ink:#1F1812; --muted:#786148; --line:#E9D9B5;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Noto Sans JP",sans-serif; color:var(--ink);
    background:var(--paper) url('/images/bg/paper-wash.jpg') center/cover no-repeat fixed;
    -webkit-font-smoothing:antialiased; min-height:100dvh;
    display:flex; align-items:center; justify-content:center; text-align:center;
    padding:40px 22px; position:relative; overflow-x:hidden;
  }
  body::before{content:"";position:fixed;inset:0;background:rgba(255,249,238,.78);z-index:0}
  .wrap{position:relative;z-index:1;max-width:560px;width:100%;display:flex;flex-direction:column;align-items:center}

  .oji{width:clamp(150px,42vw,224px);height:auto;filter:drop-shadow(0 14px 22px rgba(60,46,34,.22));
       animation:bob 3.6s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-11px)}}
  @media (prefers-reduced-motion:reduce){.oji{animation:none}}

  .num{font-weight:900;font-size:clamp(64px,17vw,120px);line-height:.95;letter-spacing:-.02em;
       color:var(--royal);margin-top:6px;text-shadow:3px 3px 0 var(--gold-soft)}
  h1{font-weight:900;font-size:clamp(20px,5.2vw,30px);margin:14px 0 0;color:var(--ink)}
  .lead{font-size:clamp(14px,3.6vw,16px);line-height:1.85;color:#5b4a36;margin-top:12px;font-weight:500}
  .en{font-size:clamp(12px,3.2vw,13px);color:var(--muted);margin-top:8px;letter-spacing:.02em}

  .btns{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin-top:30px}
  .btn{display:inline-flex;align-items:center;gap:8px;font-weight:800;font-size:15px;text-decoration:none;
       border:2px solid var(--ink);border-radius:15px;padding:13px 24px;box-shadow:4px 5px 0 var(--ink);
       transition:transform .09s ease,box-shadow .09s ease;white-space:nowrap}
  .btn:active{transform:translate(2px,3px);box-shadow:1px 2px 0 var(--ink)}
  .btn-primary{background:var(--royal);color:var(--paper)}
  .btn-primary:hover{background:var(--royal-deep)}
  .btn-ghost{background:var(--cream);color:var(--ink)}
  .btn-ghost:hover{background:#f3e6c9}
  .btn svg{display:block}

  .home{margin-top:26px;font-size:12.5px}
  .home a{color:var(--muted);text-decoration:none;border-bottom:1px dashed #c9b78f;padding-bottom:1px}
  .home a:hover{color:var(--royal)}
</style>
</head>
<body>
  <main class="wrap">
    <img class="oji" src="/images/oji/oji_idea.png" alt="ビーガン王子" width="224" height="272" />
    <div class="num">404</div>
    <h1>あれ、ページが見つかりません。</h1>
    <p class="lead">お探しのページは、引っ越したか、なくなってしまったみたいです。<br/>でも大丈夫 — 近くの一軒は、地図でちゃんと待っています。</p>
    <p class="en">This page wandered off — but the map is still right here.</p>

    <div class="btns">
      <a class="btn btn-primary" href="/">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
        ホームへ戻る
      </a>
      <a class="btn btn-ghost" href="https://maps.app.goo.gl/8tyER4M5xx1vQQni6?g_st=i" target="_blank" rel="noopener">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-6.3-7-11a7 7 0 1114 0c0 4.7-7 11-7 11z"/><circle cx="12" cy="10" r="2.6"/></svg>
        マップを見る
      </a>
    </div>

    <p class="home"><a href="/en/">Looking for English? Go to the map &rarr;</a></p>
  </main>
</body>
</html>
