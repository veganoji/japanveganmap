<!DOCTYPE html>
<html lang="ja" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>カードボタン・ラボ · Japan Vegan Map</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    .__seed { color:inherit; }
    @theme {
      --color-paper:#FFF9EE; --color-cream:#FDF1DA; --color-cream-2:#F6E4BD;
      --color-royal:#C9223A; --color-ink:#1F1812; --color-ink-soft:#3C2E22; --color-muted:#786148;
      --font-noto-sans-jp:"Noto Sans JP", sans-serif;
    }
    html,body { background:var(--color-cream-2); color:var(--color-ink); }
    body { font-family:var(--font-noto-sans-jp); }
    .font-display { font-family:var(--font-noto-sans-jp); font-weight:900; }

    /* explore card (from the real page) */
    .explore-card {
      position:relative; display:block; border-radius:24px; overflow:hidden;
      border:2.5px solid var(--color-ink); box-shadow:5px 6px 0 var(--color-ink);
      transition: transform .2s ease, box-shadow .2s ease; min-height:272px;
    }
    .explore-card:hover { transform: translate(2px,3px); box-shadow:3px 3px 0 var(--color-ink); }
    .explore-icon-wrap { position:relative; display:grid; place-items:center; width:128px; height:128px; margin:0 auto 6px; }
    .explore-icon-wrap::before { content:""; position:absolute; inset:4px; border-radius:50%;
      background:radial-gradient(circle, rgba(255,249,238,.5), rgba(255,249,238,0) 70%); }
    .explore-icon { position:relative; width:108px; height:108px; object-fit:contain;
      filter: drop-shadow(0 7px 10px rgba(31,24,18,.30)); transition: transform .28s ease; }
    .explore-card:hover .explore-icon { transform: translateY(-5px) scale(1.06) rotate(-3deg); }

    /* ── CTA variants ── */
    .cta { display:inline-flex; align-items:center; gap:8px; font-weight:700; font-size:14.5px; text-decoration:none; transition: all .2s ease; }
    .cta .arr { transition: transform .2s ease; }
    .explore-card:hover .arr { transform: translateX(4px); }

    /* A — minimal text + arrow (current) */
    .cta-a { color:var(--color-paper); }

    /* B — outline pill */
    .cta-b { color:var(--color-paper); border:1.5px solid rgba(255,249,238,.6); border-radius:999px; padding:7px 17px; }
    .explore-card:hover .cta-b { background:rgba(255,249,238,.16); border-color:rgba(255,249,238,.95); }

    /* C — solid paper pill (card-colour text) */
    .cta-c { background:var(--color-paper); color:var(--card-ink); border-radius:999px; padding:8px 18px; }
    .explore-card:hover .cta-c { transform: translateY(-2px); box-shadow:0 7px 16px rgba(31,24,18,.28); }

    /* D — chibi sticker (matches site buttons) */
    .cta-d { background:var(--color-paper); color:var(--card-ink); border:2.5px solid var(--color-ink);
      border-radius:13px; padding:8px 16px; box-shadow:3px 3px 0 var(--color-ink); }
    .explore-card:hover .cta-d { transform: translate(2px,2px); box-shadow:1px 1px 0 var(--color-ink); }

    /* E — underline-grow link */
    .cta-e { color:var(--color-paper); position:relative; padding-bottom:3px; }
    .cta-e::after { content:""; position:absolute; left:0; bottom:0; height:2px; width:100%;
      background:var(--color-paper); transform:scaleX(0); transform-origin:left; transition: transform .25s ease; }
    .explore-card:hover .cta-e::after { transform: scaleX(1); }

    /* F — gold accent pill */
    .cta-f { background:#D4A847; color:var(--color-ink); border-radius:999px; padding:8px 18px; border:2px solid var(--color-ink); }
    .explore-card:hover .cta-f { transform: translateY(-2px); }

    /* lab chrome */
    .optlabel { max-width:1100px; margin:0 auto; padding:30px 24px 6px; display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; }
    .optnum { font-weight:900; font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:var(--color-royal);
      background:var(--color-paper); border:2px solid var(--color-ink); border-radius:999px; padding:4px 12px; box-shadow:2px 2px 0 var(--color-ink); }
    .optname { font-weight:900; font-size:19px; color:var(--color-ink); }
    .optdesc { font-size:13px; color:var(--color-muted); font-weight:600; }
    .row { max-width:1100px; margin:0 auto; padding:10px 24px 8px; display:grid; grid-template-columns:repeat(3,1fr); gap:22px; }
    @media (max-width:760px){ .row { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <header style="background:var(--color-ink); color:var(--color-paper); padding:16px 24px; text-align:center; position:sticky; top:0; z-index:50;">
    <div style="font-weight:900; font-size:16px;">🔘 カードボタン・ラボ — 「選択」セクションのCTA</div>
    <div style="font-size:12.5px; opacity:.85; margin-top:3px;">各カード下のボタンのデザイン案。気に入った記号（A〜F）を教えてください。</div>
  </header>

  <div id="lab"></div>
  <footer style="text-align:center; padding:28px; color:var(--color-muted); font-size:13px;">A〜F のどれかを選んでね 👑</footer>

  <script>
    var CARDS = [
      { title:"からだ", desc:"いいことだらけの植物性。健康と栄養の話。", cta:"ビーガンと体",  icon:"/images/explore/heart.png", grad:"linear-gradient(160deg,#E55063,#C9223A)", ink:"#C9223A" },
      { title:"地球",   desc:"食卓から、地球を変える。環境とのつながり。", cta:"ビーガンと地球", icon:"/images/explore/earth.png", grad:"linear-gradient(160deg,#6C9560,#3F6A3A)", ink:"#3F6A3A" },
      { title:"海",     desc:"海で、いま起きていること。魚たちを、かぞえる。", cta:"海をかぞえる",  icon:"/images/explore/fish.png",  grad:"linear-gradient(160deg,#2B7AB0,#16465F)", ink:"#16465F" }
    ];
    var OPTIONS = [
      { n:"A", name:"現在（テキスト＋矢印）", desc:"いまの最小スタイル", cls:"cta-a" },
      { n:"B", name:"アウトライン・ピル", desc:"白い細枠の丸ボタン、ホバーで塗り", cls:"cta-b" },
      { n:"C", name:"ペーパー・ピル（塗り）", desc:"クリーム塗りつぶし＋カード色の文字", cls:"cta-c" },
      { n:"D", name:"チビ・ステッカー", desc:"サイト共通のボタン言語（インク枠＋影）", cls:"cta-d" },
      { n:"E", name:"下線リンク", desc:"ホバーで下線がのびる軽い表現", cls:"cta-e" },
      { n:"F", name:"ゴールド・ピル", desc:"金のアクセントボタン", cls:"cta-f" }
    ];
    var ARROW = '<svg class="arr" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7h8m0 0L7.5 3.5M11 7l-3.5 3.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>';
    var lab = document.getElementById("lab");
    OPTIONS.forEach(function (o) {
      var label = document.createElement("div"); label.className = "optlabel";
      label.innerHTML = '<span class="optnum">'+o.n+'</span><span class="optname">'+o.name+'</span><span class="optdesc">'+o.desc+'</span>';
      lab.appendChild(label);
      var row = document.createElement("div"); row.className = "row";
      CARDS.forEach(function (c) {
        var a = document.createElement("a");
        a.className = "explore-card"; a.href = "javascript:void 0";
        a.style.background = c.grad; a.style.setProperty("--card-ink", c.ink);
        a.innerHTML =
          '<div class="p-7 h-full flex flex-col items-center text-center" style="color:var(--color-paper)">' +
            '<div class="explore-icon-wrap"><img class="explore-icon" src="'+c.icon+'" alt=""></div>' +
            '<h3 class="font-display text-[24px] leading-tight">'+c.title+'</h3>' +
            '<p class="mt-2.5 text-[14px] leading-[1.8] opacity-95 flex-1">'+c.desc+'</p>' +
            '<span class="cta '+o.cls+' mt-5">'+c.cta+' '+ARROW+'</span>' +
          '</div>';
        row.appendChild(a);
      });
      lab.appendChild(row);
    });
  </script>
</body>
</html>
