<!DOCTYPE html>
<html lang="ja" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>гӮ№гғҶгғғгӮ«гғјгғ»гӮ«гғјгғүеӨүеҘҸ В· Japan Vegan Map</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    .__seed { color:inherit; }
    @theme {
      --color-paper:#FFF9EE; --color-cream:#FDF1DA; --color-cream-2:#F6E4BD;
      --color-royal:#C9223A; --color-gold:#D4A847; --color-gold-deep:#9C7E2A; --color-ink:#1F1812; --color-ink-soft:#3C2E22; --color-muted:#786148;
      --font-noto-sans-jp:"Noto Sans JP", sans-serif;
    }
    html,body { background:var(--color-cream-2); color:var(--color-ink); }
    body { font-family:var(--font-noto-sans-jp); }

    /* в”Җв”Җ Big breakout-sticker base в”Җв”Җ */
    a.bs { text-decoration:none; position:relative; display:block; border-radius:24px; box-shadow:5px 6px 0 var(--color-ink);
      margin-top:46px; padding:62px 22px 26px; text-align:center; min-height:232px;
      background:var(--color-paper); border:4px solid var(--accent); transition: transform .22s ease, box-shadow .22s ease; }
    a.bs:hover { transform:translate(2px,3px); box-shadow:3px 3px 0 var(--color-ink); }
    .bs .ic { position:absolute; top:-46px; left:50%; transform:translateX(-50%); width:116px; height:116px; object-fit:contain;
      filter:drop-shadow(0 8px 10px rgba(31,24,18,.28)); transition:transform .25s ease; }
    a.bs:hover .ic { transform:translateX(-50%) translateY(-5px) rotate(-4deg) scale(1.05); }
    .bs h3 { font-weight:900; font-size:24px; color:var(--accent); }
    .bs p { margin-top:8px; font-size:13.5px; line-height:1.75; color:var(--color-ink-soft); }
    .bs .cta { margin-top:16px; display:inline-flex; align-items:center; gap:8px; font-weight:800; font-size:14px; }
    .bs .arr { transition: transform .2s ease; }
    a.bs:hover .arr { transform: translateX(3px); }

    /* V1 В· cream + accent border + solid accent pill (the original в‘Ө) */
    .v1 .cta { background:var(--accent); color:#fff; border-radius:999px; padding:9px 20px; }

    /* V2 В· cream + INK border + chibi-sticker button (most site-consistent) */
    a.bs.v2 { border:3px solid var(--color-ink); }
    .v2 h3 { color:var(--color-ink); }
    .v2 .cta { background:var(--color-paper); color:var(--accent); border:2.5px solid var(--color-ink); border-radius:12px; padding:8px 16px; box-shadow:3px 3px 0 var(--color-ink); }
    a.bs.v2:hover .cta { transform:translate(2px,2px); box-shadow:1px 1px 0 var(--color-ink); }

    /* V3 В· soft-tint bg + accent border + two-tone GO */
    a.bs.v3 { background:var(--tint); border:3px solid var(--accent); }
    .v3 .cta { background:var(--color-paper); color:var(--accent); border:2.5px solid var(--accent); border-radius:999px; padding:5px 7px 5px 18px; }
    .v3 .cta .arr { width:26px; height:26px; padding:6px; box-sizing:border-box; border-radius:50%; background:var(--accent); color:#fff; }

    /* V4 В· full accent colour + paper text + outline button (inverted/bold) */
    a.bs.v4 { background:var(--accent); border:3px solid var(--color-ink); }
    .v4 h3 { color:#fff; }
    .v4 p { color:rgba(255,249,238,.92); }
    .v4 .cta { background:transparent; color:#fff; border:2px solid rgba(255,255,255,.7); border-radius:999px; padding:8px 18px; }
    a.bs.v4:hover .cta { background:rgba(255,255,255,.16); }

    /* V5 В· cream + GOLD border + gold pill (royal/warm) */
    a.bs.v5 { border:4px solid var(--color-gold); }
    .v5 h3 { color:var(--color-ink); }
    .v5 .cta { background:var(--color-gold); color:var(--color-ink); border:2px solid var(--color-ink); border-radius:999px; padding:8px 18px; }
    a.bs.v5:hover .cta { background:var(--color-gold-deep); color:#fff; }

    /* V6 В· cream + accent border + circular-arrow CTA */
    .v6 .cta { color:var(--accent); }
    .v6 .cta .arr { width:34px; height:34px; padding:10px; box-sizing:border-box; border-radius:50%; background:var(--accent); color:#fff; }

    /* lab chrome */
    .optlabel { max-width:1120px; margin:0 auto; padding:40px 24px 8px; display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; }
    .optnum { font-weight:900; font-size:13px; letter-spacing:.12em; color:var(--color-royal);
      background:var(--color-paper); border:2px solid var(--color-ink); border-radius:999px; padding:4px 13px; box-shadow:2px 2px 0 var(--color-ink); }
    .optname { font-weight:900; font-size:19px; color:var(--color-ink); }
    .optdesc { font-size:13px; color:var(--color-muted); font-weight:600; }
    .row { max-width:1120px; margin:0 auto; padding:12px 24px 10px; display:grid; grid-template-columns:repeat(3,1fr); gap:26px; }
    @media (max-width:780px){ .row { grid-template-columns:1fr; gap:40px; } }
  </style>
</head>
<body>
  <header style="background:var(--color-ink); color:var(--color-paper); padding:16px 24px; text-align:center; position:sticky; top:0; z-index:50;">
    <div style="font-weight:900; font-size:16px;">рҹ§ё гғ“гғғгӮ°гғ»гӮ№гғҶгғғгӮ«гғјгғ»гӮ«гғјгғүеӨүеҘҸ вҖ” иүІпјҶгғңгӮҝгғі</div>
    <div style="font-size:12.5px; opacity:.85; margin-top:3px;">в‘ӨгҒ®гҒҜгҒҝеҮәгҒ—гӮ«гғјгғүгӮ’еңҹеҸ°гҒ«гҖҒй…ҚиүІгҒЁгғңгӮҝгғігӮ’еӨүгҒҲгҒҹ6жЎҲгҖӮз•ӘеҸ·гҒ§ж•ҷгҒҲгҒҰгҒҸгҒ гҒ•гҒ„гҖӮ</div>
  </header>

  <div id="lab"></div>
  <footer style="text-align:center; padding:30px; color:var(--color-muted); font-size:13px;">в‘ гҖңв‘Ҙ гҒ®гҒ©гӮҢгҒӢпјҲпјӢж··гҒңгҒҰгӮӮOKпјүрҹ‘‘</footer>

  <script>
    var CARDS = [
      { title:"гҒӢгӮүгҒ ", desc:"гҒ„гҒ„гҒ“гҒЁгҒ гӮүгҒ‘гҒ®жӨҚзү©жҖ§гҖӮеҒҘеә·гҒЁж „йӨҠгҒ®и©ұгҖӮ", cta:"гғ“гғјгӮ¬гғігҒЁдҪ“",  icon:"/images/explore/heart.png", accent:"#C9223A", tint:"#FBE3E7" },
      { title:"ең°зҗғ",   desc:"йЈҹеҚ“гҒӢгӮүгҖҒең°зҗғгӮ’еӨүгҒҲгӮӢгҖӮз’°еўғгҒЁгҒ®гҒӨгҒӘгҒҢгӮҠгҖӮ", cta:"гғ“гғјгӮ¬гғігҒЁең°зҗғ", icon:"/images/explore/earth.png", accent:"#3F6A3A", tint:"#E6F0DF" },
      { title:"жө·",     desc:"жө·гҒ§гҖҒгҒ„гҒҫиө·гҒҚгҒҰгҒ„гӮӢгҒ“гҒЁгҖӮйӯҡгҒҹгҒЎгӮ’гҖҒгҒӢгҒһгҒҲгӮӢгҖӮ", cta:"жө·гӮ’гҒӢгҒһгҒҲгӮӢ",  icon:"/images/explore/fish.png",  accent:"#1F6F94", tint:"#DBEBF3" }
    ];
    var A = '<svg class="arr" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7h8m0 0L7.5 3.5M11 7l-3.5 3.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>';
    var OPTIONS = [
      { n:"в‘ ", name:"гӮҜгғӘгғјгғ Г—иүІжһ пјҸгӮҪгғӘгғғгғүгғ»гғ”гғ«", desc:"е…ғгҒ®в‘ӨгҖӮиүІгҒ®еӨӘжһ пјӢеЎ—гӮҠгҒӨгҒ¶гҒ—гҒ®иүІгғңгӮҝгғі", v:"v1" },
      { n:"в‘Ў", name:"гӮҜгғӘгғјгғ Г—гӮӨгғігӮҜжһ пјҸгғҒгғ“гғ»гӮ№гғҶгғғгӮ«гғј", desc:"й»’жһ пјӢгӮҜгғӘгғјгғ гҒ®гӮ№гғҶгғғгӮ«гғјгғңгӮҝгғіпјҲгӮөгӮӨгғҲе…ұйҖҡгҒ®иЁҖиӘһпјү", v:"v2" },
      { n:"в‘ў", name:"ж·ЎиүІең°Г—иүІжһ пјҸгғ„гғјгғҲгғјгғіGO", desc:"гҒҶгҒЈгҒҷгӮүиүІең°пјӢдёёгҒ„зҹўеҚ°гӮ’еҹӢгӮҒгҒҹгғ”гғ«", v:"v3" },
      { n:"в‘Ј", name:"еҸҚи»ўпјҡиүІгҒ№гҒҹГ—зҷҪж–Үеӯ—пјҸзҷҪгӮўгӮҰгғҲгғ©гӮӨгғі", desc:"гӮ«гғјгғүгӮ’иүІгҒ§еЎ—гӮҠгҖҒзҷҪж–Үеӯ—пјӢзҷҪжһ гғңгӮҝгғігҖӮе…ғж°—гҒ§зӣ®з«ӢгҒӨ", v:"v4" },
      { n:"в‘Ө", name:"гӮҜгғӘгғјгғ Г—гӮҙгғјгғ«гғүжһ пјҸгӮҙгғјгғ«гғүгғ»гғ”гғ«", desc:"зҺӢеӯҗгӮүгҒ—гҒ„йҮ‘гҒ®жһ пјҶйҮ‘гғңгӮҝгғігҖӮе…ЁгӮ«гғјгғүзөұдёҖгғҲгғјгғі", v:"v5" },
      { n:"в‘Ҙ", name:"гӮҜгғӘгғјгғ Г—иүІжһ пјҸдёёгӮўгғӯгғј", desc:"иүІгҒ®дёёгҒ„зҹўеҚ°гғңгӮҝгғігӮ’дё»еҪ№гҒ«", v:"v6" }
    ];
    var lab = document.getElementById("lab");
    OPTIONS.forEach(function(o){
      var label=document.createElement("div"); label.className="optlabel";
      label.innerHTML='<span class="optnum">'+o.n+'</span><span class="optname">'+o.name+'</span><span class="optdesc">'+o.desc+'</span>';
      lab.appendChild(label);
      var row=document.createElement("div"); row.className="row";
      row.innerHTML = CARDS.map(function(c){
        return '<a class="bs '+o.v+'" href="javascript:void 0" style="--accent:'+c.accent+'; --tint:'+c.tint+'">' +
          '<img class="ic" src="'+c.icon+'" alt="">' +
          '<h3>'+c.title+'</h3>' +
          '<p>'+c.desc+'</p>' +
          '<span class="cta">'+c.cta+' '+A+'</span>' +
        '</a>';
      }).join("");
      lab.appendChild(row);
    });
  </script>
</body>
</html>
